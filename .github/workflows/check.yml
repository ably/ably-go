# Based upon:
#   https://github.com/actions/starter-workflows/blob/main/ci/go.yml
name: Build and Run Unit Tests

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions: {}

jobs:
  check:

    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    strategy:
      fail-fast: false
      matrix:
        # Test on the two latest Go releases, matching the Go release policy: https://go.dev/doc/devel/release
        go-version: ['1.25', '1.26']

    steps:
      - uses: actions/checkout@ee0669bd1cc54295c223e0bb666b733df41de1c5 # v2
        with:
          submodules: 'recursive'
          persist-credentials: false

      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@bfdd3570ce990073878bf10f6b2d79082de49492 # v2
        with:
          go-version: ${{ matrix.go-version }}

      - name: Download Packages
        run: go get -t -v ./ably/...
      
      - name: Format
        run: if [ "$(gofmt -l . | wc -l)" -gt 0 ]; then exit 1; fi

      - name: Vet
        run: go vet ./ably/... ./scripts/...

      - name: Ensure generated code is up-to-date
        run: scripts/ci-generate.sh

      - name: Install go-junit-report
        run: go install github.com/jstemmer/go-junit-report@latest

      - name: Unit Tests
        run: |
          set -o pipefail
          go test -v -tags=unit ./... |& tee >(~/go/bin/go-junit-report > unit.junit)

      - name: Upload test results
        if: always()
        uses: ably/test-observability-action@5b61d9c59f356b83426cab1b8243dd8bf03c1bea # v1
        with:
          server-url: 'https://test-observability.herokuapp.com'
          server-auth: ${{ secrets.TEST_OBSERVABILITY_SERVER_AUTH_KEY }}
          path: '.'

      - name: View unit test results
        uses: dorny/test-reporter@3eeb9fc888e82e8be2fb356bbeec2750231672bc # v1
        if: success() || failure()
        with:
          name: Unit Test Results (Go ${{ matrix.go-version }})
          path: unit.junit
          reporter: java-junit
          fail-on-error: true
          only-summary: false
